name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CONFIGURATION: Release
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_test_and_push:
    name: Build, test, and push image
    runs-on: ubuntu-latest
    environment: staging

    outputs:
      image: ${{ steps.image.outputs.image }}
      staging_url: ${{ steps.urls.outputs.staging_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RazorCicdDemo.slnx

      - name: Build
        run: dotnet build RazorCicdDemo.slnx --configuration "$DOTNET_CONFIGURATION" --no-restore

      - name: Test
        run: dotnet test RazorCicdDemo.slnx --configuration "$DOTNET_CONFIGURATION" --no-build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build image name
        id: image
        run: |
          image="${{ vars.AZURE_ACR_LOGIN_SERVER }}/${{ vars.CONTAINER_IMAGE_NAME }}:${IMAGE_TAG}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"

      - name: Build Docker image
        run: docker build -t "$IMAGE" .

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy image to staging slot
        run: |
          az webapp config container set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --slot staging \
            --container-image-name "$IMAGE" \
            --container-registry-url "https://${{ vars.AZURE_ACR_LOGIN_SERVER }}"

      - name: Restart staging slot
        run: |
          az webapp restart \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --slot staging

      - name: Build staging URL
        id: urls
        run: |
          staging_url="https://${{ vars.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
          echo "staging_url=${staging_url}" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        run: scripts/smoke-test.sh "${{ steps.urls.outputs.staging_url }}"

      - name: Deployment summary
        run: |
          {
            echo "### Staging deployment"
            echo ""
            echo "- Image: \`${{ steps.image.outputs.image }}\`"
            echo "- Staging URL: ${{ steps.urls.outputs.staging_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  promote_to_production:
    name: Promote staging to production
    runs-on: ubuntu-latest
    needs: build_test_and_push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging into production
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --slot staging \
            --target-slot production

      - name: Build production URL
        id: urls
        run: |
          production_url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "production_url=${production_url}" >> "$GITHUB_OUTPUT"

      - name: Smoke test production
        run: scripts/smoke-test.sh "${{ steps.urls.outputs.production_url }}"

      - name: Deployment summary
        run: |
          {
            echo "### Production deployment"
            echo ""
            echo "- Image: \`${{ needs.build_test_and_push.outputs.image }}\`"
            echo "- Production URL: ${{ steps.urls.outputs.production_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
